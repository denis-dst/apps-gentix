name: gentix_scan_apps
description: "GenTix Officer App for Ticketing and Gate Control"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  flutter_secure_storage: ^10.0.0
  provider: ^6.1.1
  mobile_scanner: ^7.2.0
  intl: ^0.20.2
  google_fonts: ^8.1.0
  animate_do: ^5.1.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  awesome_snackbar_content: ^0.1.3
  vibration: ^3.1.8
  sqflite: ^2.3.0
  path: ^1.8.3
  cached_network_image: ^3.3.0
  pretty_dio_logger: ^1.3.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  camera: ^0.11.0+1
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: "^2.3.11"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#010409"
  image: assets/images/logo.png
  android: true
  ios: true
